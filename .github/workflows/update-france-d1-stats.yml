name: France D1 / Stats Scraper
on:
  schedule:
    # Elke 3 uur tussen 06:00 en 23:00 UTC (wedstrijddagen + updates)
    - cron: "0 6-23/3 * * *"
  workflow_dispatch: {}   # handmatig starten via de Actions-tab
permissions:
  contents: write
concurrency:
  group: update-stats
  cancel-in-progress: false
jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Installeer dependencies
        run: |
          pip install requests playwright
          playwright install --with-deps chromium
      - name: Draai scraper
        env:
          # Optioneel: voeg een repo-secret PROXY_URL toe (Settings → Secrets
          # and variables → Actions) met bv. http://user:pass@proxy-host:poort
          # van een residential-proxy-dienst. Deze site draait op hetzelfde
          # WBSC-platform als stats.baseball.cz, dat GitHub-runner-IP's op
          # WAF-niveau blokkeert — zonder proxy kan dat hier ook gebeuren.
          PROXY_URL: ${{ secrets.PROXY_URL }}
        run: python scraper_france_d1_stats.py
      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stats.json data/splits.json data/meta.json
          # meta.json bevat altijd een nieuwe "last_checked"-timestamp, dus er is
          # elke run wel iets om te committen.
          if git diff --cached --quiet; then
            echo "Niets om te committen (zou niet moeten gebeuren, meta.json wijzigt altijd)."
          else
            if git diff --cached --quiet -- data/stats.json data/splits.json; then
              MSG="Check France D1 stats – geen nieuwe data ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            else
              MSG="Update France D1 stats ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            fi
            git commit -m "$MSG"
            git push
          fi
